name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test

  test-node:
    # Verifies the project installs + typechecks under a Node 22+
    # environment. Uses Bun as the test runner (tests use bun:test);
    # converting to node:test would require rewriting all test files.
    # Source code is Node-compatible (only node:fs / node:path / node:crypto
    # imports), so the typecheck is the real Node-compat signal here.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test

  publish-dryrun:
    # Validates the package as it would be published to npm. Catches:
    #   - bin paths pointing at non-existent files
    #   - tarball accidentally including test/, fixtures/, specs, etc.
    #   - exports / types problems via publint and are-the-types-wrong
    #   - the smoke test verifies the bundled CLI works under plain Node.
    runs-on: ubuntu-latest
    # `--provenance` (used in the publish --dry-run gate below) requests an
    # OIDC token from GitHub. npm's current dry-run path elides the actual
    # token fetch, so this isn't strictly required today — but declaring it
    # keeps the gate hygienic if npm tightens dry-run validation, and matches
    # what a real publish-from-CI workflow would need. `contents: read` is the
    # implicit default that we restore explicitly when we narrow permissions.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: sudo apt-get update && sudo apt-get install -y jq
      - run: bun run build
      # `npm publish --dry-run` runs the same normalize-package-data pass as a
      # real publish (npm pack does NOT). Pipe to a grep that fails the job if
      # any "warn publish" line slips through — that's how the bin[./...] issue
      # would have been caught before the user hit it on a live publish.
      - name: npm publish --dry-run (warn publish == failure)
        run: |
          set -o pipefail
          npm publish --dry-run --provenance --access public 2>&1 | tee /tmp/publish.log
          if grep -E '^npm warn publish' /tmp/publish.log; then
            echo "::error::npm publish emitted warn lines — fix package.json before shipping."
            exit 1
          fi
      - run: npm pack --dry-run
      - run: npx --yes publint
      - run: npx --yes @arethetypeswrong/cli --pack --ignore-rules cjs-resolves-to-esm
      - run: ./scripts/smoke-test.sh
